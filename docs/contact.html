<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Mijn Gezondheid</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <header class="app-header">
        <h1>Contact</h1>
    </header>

    <main>
        <form id="contact-form">

            <div class="form-groep">
                <label for="naam">Naam</label>
                <input type="text" id="naam" name="naam" placeholder="Jouw naam" required>
            </div>

            <div class="form-groep">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="jouw@email.com" required>
            </div>

            <div class="form-groep">
                <label for="bericht">Bericht</label>
                <textarea id="bericht" name="bericht" placeholder="Schrijf hier je bericht..." rows="5" required></textarea>
            </div>

            <button type="submit" class="knop-opslaan">Verstuur bericht</button>

        </form>
    </main>

    <nav class="bottom-nav">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="toevoegen.html">Add</a>
        <a href="about.html">About</a>
        <a href="contact.html" class="actief">Contact</a>
        <a href="sport.html">Sport</a>
    </nav>

    <script src="/js/app.js"></script>
</body>
</html>
