<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Mijn Gezondheid</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="manifest" href="/manifest.json">
</head>
<body>

    <header class="app-header">
        <button id="taal-knop" class="taal-knop">EN</button>
        <h1 data-i18n="dashboard_titel">Dashboard</h1>
    </header>

    <main>
        <section class="diagram-sectie">
            <h2 data-i18n="diagram_titel">Ingenomen vs verbrande kcal</h2>
            <div id="diagram" class="diagram"></div>
        </section>

        <section class="periode-filter">
            <button class="filter-knop actief" data-periode="dag" data-i18n="filter_dag">Dag</button>
            <button class="filter-knop" data-periode="week" data-i18n="filter_week">Week</button>
            <button class="filter-knop" data-periode="maand" data-i18n="filter_maand">Maand</button>
        </section>

        <section class="items-lijst" id="items-lijst">
            <p class="geen-items" data-i18n="geen_items_periode">Nog geen items toegevoegd.</p>
        </section>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" data-i18n="nav_home">Home</a>
        <a href="dashboard.html" class="actief" data-i18n="nav_dashboard">Dashboard</a>
        <a href="toevoegen.html" data-i18n="nav_add">Add</a>
        <a href="about.html" data-i18n="nav_about">About</a>
        <a href="contact.html" data-i18n="nav_contact">Contact</a>
        <a href="sport.html" data-i18n="nav_sport">Sport</a>
    </nav>

    <script src="/js/app.js"></script>
</body>
</html>
