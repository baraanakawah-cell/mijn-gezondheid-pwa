<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voeg maaltijd toe - Mijn Gezondheid</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <header class="app-header">
        <h1>Voeg maaltijd toe</h1>
    </header>

    <main>
        <form id="maaltijd-form">

            <div class="form-groep">
                <label for="categorie">Maaltijd type</label>
                <select id="categorie" name="categorie" required>
                    <option value="">Kies een type</option>
                    <option value="ontbijt">Ontbijt</option>
                    <option value="lunch">Lunch</option>
                    <option value="diner">Diner</option>
                    <option value="snack">Snack</option>
                </select>
            </div>

            <div class="form-groep">
                <label for="datum">Datum</label>
                <input type="date" id="datum" name="datum" required>
            </div>

            <div class="form-groep">
                <label for="omschrijving">Omschrijving</label>
                <input type="text" id="omschrijving" name="omschrijving" placeholder="Bijv. Boterham met kaas" required>
            </div>

            <div class="form-groep">
                <label for="kcal">Calorieën (kcal)</label>
                <input type="number" id="kcal" name="kcal" placeholder="Bijv. 220" min="0" required>
            </div>

            <button type="submit" class="knop-opslaan">Opslaan</button>

        </form>
    </main>

    <nav class="bottom-nav">
        <a href="index.html">Home</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="toevoegen.html" class="actief">Add</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="sport.html">Sport</a>
    </nav>

    <script src="/js/app.js"></script>
</body>
</html>
