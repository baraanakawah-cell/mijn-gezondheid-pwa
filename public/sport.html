<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport - Mijn Gezondheid</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="manifest" href="/manifest.json">
</head>
<body>

    <header class="app-header">
        <button id="taal-knop" class="taal-knop">EN</button>
        <h1 data-i18n="sport_titel">Sport berekenen</h1>
    </header>

    <main>
        <section class="form-groep">
            <label for="gewicht" data-i18n="label_gewicht">Jouw gewicht (kg)</label>
            <input type="number" id="gewicht" placeholder="Bijv. 70" min="1">
        </section>

        <section class="form-groep">
            <label for="maaltijd-select" data-i18n="label_kies_maaltijd">Kies een maaltijd</label>
            <select id="maaltijd-select">
                <option value="" data-i18n="optie_selecteer_maaltijd">Selecteer een maaltijd</option>
            </select>
        </section>

        <section class="form-groep">
            <label for="sport-select" data-i18n="label_kies_sport">Kies een sport</label>
            <select id="sport-select">
                <option value="3.5" data-i18n="sport_wandelen">Wandelen</option>
                <option value="6.0" data-i18n="sport_fietsen">Fietsen</option>
                <option value="9.8" data-i18n="sport_hardlopen">Hardlopen</option>
                <option value="7.0" data-i18n="sport_zwemmen">Zwemmen</option>
            </select>
        </section>

        <button id="bereken-knop" class="knop-opslaan" data-i18n="knop_berekenen">Berekenen</button>

        <section id="resultaat" class="resultaat-kaart" hidden>
            <h2 data-i18n="resultaat_titel">Resultaat</h2>
            <p id="resultaat-tekst"></p>
            <button id="bevestig-knop" class="knop-opslaan" data-i18n="knop_sport_gedaan">Sport gedaan</button>
        </section>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" data-i18n="nav_home">Home</a>
        <a href="dashboard.html" data-i18n="nav_dashboard">Dashboard</a>
        <a href="toevoegen.html" data-i18n="nav_add">Add</a>
        <a href="sport.html" class="actief" data-i18n="nav_sport">Sport</a>
        <a href="about.html" data-i18n="nav_about">About</a>
        <a href="contact.html" data-i18n="nav_contact">Contact</a>
    </nav>

    <script src="/js/app.js"></script>
</body>
</html>
