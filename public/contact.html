<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Mijn Gezondheid</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="manifest" href="/manifest.json">
</head>
<body>

    <header class="app-header">
        <button id="taal-knop" class="taal-knop">EN</button>
        <h1 data-i18n="contact_titel">Contact</h1>
    </header>

    <main>
        <form id="contact-form">

            <div class="form-groep">
                <label for="naam" data-i18n="label_naam">Naam</label>
                <input type="text" id="naam" name="naam" placeholder="Jouw naam" required>
            </div>

            <div class="form-groep">
                <label for="email" data-i18n="label_email">Email</label>
                <input type="email" id="email" name="email" placeholder="jouw@email.com" required>
            </div>

            <div class="form-groep">
                <label for="bericht" data-i18n="label_bericht">Bericht</label>
                <textarea id="bericht" name="bericht" placeholder="Schrijf hier je bericht..." rows="5" required></textarea>
            </div>

            <button type="submit" class="knop-opslaan" data-i18n="knop_verstuur">Verstuur bericht</button>

        </form>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" data-i18n="nav_home">Home</a>
        <a href="dashboard.html" data-i18n="nav_dashboard">Dashboard</a>
        <a href="toevoegen.html" data-i18n="nav_add">Add</a>
        <a href="about.html" data-i18n="nav_about">About</a>
        <a href="contact.html" class="actief" data-i18n="nav_contact">Contact</a>
        <a href="sport.html" data-i18n="nav_sport">Sport</a>
    </nav>

    <script src="/js/app.js"></script>
</body>
</html>
